# Optional Judge0 CE stack for the in-browser IDE playground.
# Start with: docker compose -f docker-compose.judge0.yml up -d
# Requires Linux host with cgroups (native Linux, WSL2, or Docker Desktop).
#
# Uses a dedicated Compose project name so Judge0 redis/db do not collide with
# docker-compose.prod.yml services in the default "nibras" project.
name: nibras-judge0

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  judge0-server:
    image: mrkushalsm/judge0:cgv2
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - '2358:2358'
    privileged: true
    cgroup: host
    <<: *default-logging
    restart: unless-stopped
    depends_on:
      judge0-db:
        condition: service_started
      judge0-redis:
        condition: service_started

  judge0-worker:
    image: mrkushalsm/judge0:cgv2
    command: ['./scripts/workers']
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    cgroup: host
    <<: *default-logging
    restart: unless-stopped
    depends_on:
      judge0-db:
        condition: service_started
      judge0-redis:
        condition: service_started

  judge0-db:
    image: postgres:16.2
    env_file: ./judge0/judge0.conf
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    <<: *default-logging
    restart: unless-stopped

  judge0-redis:
    image: redis:7.2.4
    command:
      [
        'bash',
        '-c',
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: ./judge0/judge0.conf
    <<: *default-logging
    restart: unless-stopped

volumes:
  judge0_postgres_data:
