<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - AI Recommendations</title>
    <script src="../services/session.js"></script>
    <script src="../services/auth-guard.js" data-login="../Login/loginPage/login.html"></script>
    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./recommendation.css">
</head>
<body>
    <div id="app-root" hidden></div>

    <!-- MAIN CONTENT (Full Width) -->
    <main class="main-layout">
        
        <!-- HEADER -->
        <header class="top-header-full">
            <div class="logo-area">
                <img src="/Assets/images/logo-light.png" alt="Nibras Logo" class="header-logo" id="app-logo">
            </div>
            
            <div class="header-actions">
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <div class="profile-circle-small">ZA</div>
            </div>
        </header>

        <div class="content-wrapper-centered">
            
             <!-- Page Title Area -->
             <div class="rec-intro-section">
                <h1><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--accent-blue); margin-right:10px;"></i> AI Career Recommendation</h1>
                <p>Recommendations are generated from your backend grade records using the external ML recommendation API.</p>
                <p class="recommendation-meta" id="recommendation-meta"></p>
             </div>

            <!-- Recommendation List -->
            <div class="track-list" id="track-list-container">
                <!-- JS Injected -->
            </div>

            <!-- AI Explanation Footer -->
            <section class="card ai-footer-card" id="recommendation-explanation-card">
                <div class="ai-footer-content">
                    <div class="ai-icon-box"><i class="fa-solid fa-robot"></i></div>
                    <div id="recommendation-explanation-content">
                        <h4>Advisor explanation</h4>
                        <p>The full recommendation explanation will appear here after the API responds.</p>
                    </div>
                </div>
            </section>

        </div>
    </main>

        <script src="../react-bootstrap.js"></script>
    <script src="./recommendation.js"></script>
</body>
</html>
