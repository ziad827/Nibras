            <div class="header-actions">
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="profile-circle-small">ZA</div>
            </div>

        <!-- QUESTION DETAIL VIEW (Always Visible) -->
        <div class="content-wrapper">
            
            <div class="detail-container">
                <a href="../../community.html" class="btn-back">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </a>
                <!-- Main Question Card -->
                <div class="q-full-card" id="q-main-content">
                    <!-- JS Injected -->
                </div>

                <!-- Answers Header -->
                <h3 class="section-header-text" id="answers-count-header">Loading Answers...</h3>

                <!-- Answers List -->
                <div class="answers-list" id="answers-container">
                    <!-- JS Injected -->
                </div>

                <!-- Your Answer Input -->
                <div class="your-answer-section">
                    <h3>Your Answer</h3>
                    <textarea class="answer-textarea" placeholder="Type your answer here..."></textarea>
                    <div style="text-align: right; margin-top: 1rem;">

                    </div>
                </div>

        <script src="../../../../react-page-utils.js"></script>
    <script>
        if (window.NibrasShared?.session?.updateUserInfoDisplay) {

        }
    </script>
    <script src="../../../../react-bootstrap.js"></script>
    <script src="./question.js"></script>
    <script src="../../../services/gamification-ui.js"></script>
    <script>
    (function() {
        try {
            var _u = JSON.parse(localStorage.getItem('user') || '{}');
            var _r = String(_u?.role?.name || _u?.role || '').toLowerCase();
            if (_r === 'instructor') {
                var hideTexts = ['CLI', 'Competitions', 'Achievements', 'AI Tutor'];
                document.querySelectorAll('.nav-link').forEach(function(link) {
                    if (hideTexts.some(function(t) { return link.textContent.trim().includes(t); })) {
                        var item = link.closest('.nav-item');
                        if (item) item.style.display = 'none';
                    }
                });
            }
        } catch (_) {}
    })();
    </script>
