    <script>
        (function initTheme() {
            const themeBtn = document.getElementById('themeBtn');
            const themeIcon = themeBtn?.querySelector('i');
            const appLogo = document.getElementById('app-logo');
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            if (currentTheme === 'dark') {
                if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                if (appLogo) appLogo.src = '/Assets/images/logo-dark.png';
            } else {
                if (themeIcon) themeIcon.className = 'fa-regular fa-moon';
                if (appLogo) appLogo.src = '/Assets/images/logo-light.png';
            }
            if (themeBtn) {
                themeBtn.classList.remove('rotating');
                void themeBtn.offsetWidth;
                themeBtn.addEventListener('click', function () {
                    themeBtn.classList.add('rotating');
                    const html = document.documentElement;
                    const current = html.getAttribute('data-theme');
                    const newTheme = current === 'light' ? 'dark' : 'light';
                    html.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    if (newTheme === 'dark') {
                        if (themeIcon) themeIcon.className = 'fa-solid fa-sun';
                        if (appLogo) appLogo.src = '/Assets/images/logo-dark.png';
                    } else {
                        if (themeIcon) themeIcon.className = 'fa-regular fa-moon';
                        if (appLogo) appLogo.src = '/Assets/images/logo-light.png';
                    }
                    setTimeout(function () { themeBtn.classList.remove('rotating'); }, 500);
                });
            }
        })();
    </script>

    <script>
    (function() {
        try {
            var _u = JSON.parse(localStorage.getItem('user') || '{}');
            var _r = String(_u?.role?.name || _u?.role || '').toLowerCase();
            if (_r === 'instructor') {
                var hideTexts = ['CLI', 'Competitions', 'Achievements', 'AI Tutor', 'Study Rooms'];
                document.querySelectorAll('.nav-link').forEach(function(link) {
                    if (hideTexts.some(function(t) { return link.textContent.trim().includes(t); })) {
                        var item = link.closest('.nav-item');
                        if (item) item.style.display = 'none';
                    }
                });
            }
        } catch (_) {}
    })();
    </script>
