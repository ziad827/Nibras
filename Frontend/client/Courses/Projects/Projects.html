<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Projects…</title>
    <script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var courseId = params.get('courseId') || localStorage.getItem('selectedCourseId') || '';
        var target = '../../Projects/projects.html';
        if (courseId) {
            target += '?courseId=' + encodeURIComponent(courseId);
        }
        window.location.replace(target);
    })();
    </script>
</head>
<body>
    <p>Redirecting to <a href="../../Projects/projects.html">Projects</a>…</p>
</body>
</html>
