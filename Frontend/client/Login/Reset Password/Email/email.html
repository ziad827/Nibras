<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Reset Password</title>
<script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="./email.css">
</head>
<body class="signup-page">
    <div id="app-root" hidden></div>

    <!-- Starry Background (Visible Only in Dark Mode) -->
    <div class="stars-container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>

    <!-- Header -->
    <header class="auth-header">
        <div class="logo-area">
            <img src="/Assets/images/logo-dark.png" alt="Nibras Logo" class="auth-logo">
        </div>
        
        <!-- Theme Toggle Button -->
        <button class="theme-toggle-btn" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <!-- Main Content -->
    <div class="auth-container">
        <div class="auth-card">
            
            <h2 class="auth-title">Reset Password</h2>

            <form id="resetForm">
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="name@gmail.com" class="form-control">
                </div>

                <button type="submit" class="btn-login" style="margin-top: 1.5rem;">Continue</button>
                
                <div class="signup-link" style="margin-top: 1rem;">
                    <a href="../../loginPage/login.html" style="font-weight: 500; font-size: 0.9rem;">Back to Login</a>
                </div>

            </form>

        </div>
    </div>

        <script src="../../../react-bootstrap.js"></script>
    <script src="./email.js"></script>
</body>
</html>
