<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In Callback</title>
<script>
        window.NibrasApiConfig = {
            googleClientId: '809028632276-sgttn83goo7em2anm7t0t5ar37m4v8nm.apps.googleusercontent.com'
        };
    </script>
    <script src="../../config.js"></script>
</head>
<body>
    <p>Processing Google sign-in...</p>
    <script>
        async function handleCallback() {
            // Check both hash parameters (from redirect) and query parameters
            let accessToken = null;
            let error = null;
            
            // Try hash first (some implementations use this)
            const hash = window.location.hash.substring(1);
            if (hash) {
                const hashParams = new URLSearchParams(hash);
                accessToken = hashParams.get('access_token');
                error = hashParams.get('error');
            }
            
            // If not in hash, try query params
            if (!accessToken && !error) {
                const queryParams = new URLSearchParams(window.location.search);
                accessToken = queryParams.get('access_token');
                error = queryParams.get('error');
                const errorDesc = queryParams.get('error_description');
                if (errorDesc && !error) error = errorDesc;
            }
            
            // Check for state to determine which page to redirect to
            const queryParams = new URLSearchParams(window.location.search);
            const state = queryParams.get('state');
            
            // Determine target page - if called from signup, go to signup.html
            const isSignup = state && state.includes('signup');
            const targetPage = isSignup ? 'signup.html' : 'login.html';
            
            if (accessToken) {
                sessionStorage.setItem('google_access_token', accessToken);
                window.location.href = targetPage + '?google_auth=success';
            } else if (error) {
                window.location.href = targetPage + '?google_auth=error&message=' + encodeURIComponent(error);
            } else {
                window.location.href = targetPage + '?google_auth=error';
            }
        }
        
        handleCallback();
    </script>
</body>
</html>
