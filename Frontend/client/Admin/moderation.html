<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Moderation Queue</title>
    <script src="../services/session.js"></script>
    <script src="../services/auth-guard.js" data-login="../Login/loginPage/login.html"></script>
    <script>
    (function () {
        var t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
        else document.documentElement.setAttribute('data-theme', 'light');
    })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../Community/QuestionID/question.css">
    <link rel="stylesheet" href="../Dashboard/dashboard.css">
    <link rel="stylesheet" href="./moderation.css">
</head>
<body>
    <div id="app-root" hidden></div>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="../Assets/images/logo-light.png" alt="Nibras Logo" class="sidebar-logo" id="app-logo">
        </div>
        <ul class="nav-menu">
            <li class="nav-item" style="margin-top:1rem;padding:0 1rem;font-size:0.72rem;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;pointer-events:none;">Admin Panel</li>
            <li class="nav-item"><a href="Dashboard/dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Admin Dashboard</a></li>
            <li class="nav-item"><a href="Courses/courses.html" class="nav-link"><i class="fa-solid fa-book-open"></i> Course Management</a></li>
            <li class="nav-item"><a href="Users/users.html" class="nav-link"><i class="fa-solid fa-users-gear"></i> User Management</a></li>
            <li class="nav-item"><a href="Roles/roles.html" class="nav-link"><i class="fa-solid fa-shield-halved"></i> Roles & Permissions</a></li>
            <li class="nav-item"><a href="Backups/backups.html" class="nav-link"><i class="fa-solid fa-database"></i> Backups</a></li>
            <li class="nav-item"><a href="AuditLogs/audit-logs.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> Audit Logs</a></li>
            <li class="nav-item"><a href="Config/config.html" class="nav-link"><i class="fa-solid fa-sliders"></i> System Config</a></li>
            <li class="nav-item"><a href="./moderation.html" class="nav-link active"><i class="fa-solid fa-flag"></i> Moderation</a></li>
            <li class="nav-item"><a href="./badges.html" class="nav-link"><i class="fa-solid fa-medal"></i> Badges</a></li>
        </ul>
        <div class="user-profile">
            <div class="avatar-circle" id="sidebar-avatar">AD</div>
            <div class="user-info"><h4 id="sidebar-name">Admin</h4><span id="sidebar-role">admin</span></div>
        </div>
        <div class="reputation-box"><span>Reputation</span><div class="rep-badge" id="sidebar-rep">0</div></div>
        <a href="../Login/loginPage/login.html" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="search-bar-global"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search..." disabled></div>
            <div class="header-actions">
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="profile-circle-small" id="header-avatar">AD</div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="dashboard-content" style="max-width: 1100px; margin: 0 auto; padding: 2rem;">
                <div class="mod-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 style="margin: 0 0 0.5rem;">Moderation Queue</h1>
                        <p style="margin: 0; color: var(--text-secondary);" id="queue-count">Loading...</p>
                    </div>
                    <div class="mod-filters" style="display: flex; gap: 8px;">
                        <button class="filter-btn active" data-status="pending" style="padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; background: var(--accent-blue); color: #fff;">Pending</button>
                        <button class="filter-btn" data-status="resolved" style="padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-secondary);">Resolved</button>
                        <button class="filter-btn" data-status="all" style="padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; background: transparent; color: var(--text-secondary);">All</button>
                    </div>
                </div>

                <div id="mod-queue-container">
                    <div class="loading-state" style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>Loading moderation queue...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../react-bootstrap.js"></script>
    <script src="../react-page-utils.js"></script>
    <script src="../services/api.js"></script>
    <script src="./moderation.js"></script>
    <script src="../services/gamification-ui.js"></script>
</body>
</html>
