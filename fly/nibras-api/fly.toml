app = 'nibras-api-v2'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile.api"

[http_service]
  internal_port = 4848
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/readyz"
    timeout = "5s"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "4848"
  COMPETITIONS_SYNC_ENABLED = "false"
